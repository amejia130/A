<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>13/03/2026 💌</title>

    <style>

        body{
        margin:0;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#ffdde1,#ee9ca7);
        font-family:Arial;
        overflow:hidden;
        }

        /* SOBRE */

        .envelope{
        width:280px;
        height:180px;
        background:#e63946;
        border-radius:8px;
        position:relative;
        cursor:pointer;
        box-shadow:0 20px 40px rgba(0,0,0,0.2);
        }

        .flap{
        position:absolute;
        width:0;
        height:0;
        border-left:140px solid transparent;
        border-right:140px solid transparent;
        border-bottom:90px solid #d62839;
        top:-90px;
        }

        /* TEXTO */

        .hint{
        margin-top:20px;
        text-align:center;
        color:white;
        font-size:16px;
        }

        /* CARTA */

        .card{
        display:none;
        background:white;
        padding:15px;
        border-radius:10px;
        width:300px;
        box-shadow:0 20px 40px rgba(0,0,0,0.2);
        text-align:center;
        }

        .card img{
        width:100%;
        border-radius:8px;
        }

        .message{
        margin-top:10px;
        font-size:16px;
        }

        /* corazones */

        .heart{
        position:absolute;
        font-size:20px;
        animation:float 4s linear infinite;
        }

        @keyframes float{

        0%{
        transform:translateY(0);
        opacity:1;
        }

        100%{
        transform:translateY(-600px);
        opacity:0;
        }

        }

    </style>

</head>

<body>

<!-- SOBRE -->

<div id="sobre">

    <div class="envelope" onclick="abrirCarta()">

        <div class="flap"></div>

    </div>

    <div class="hint">Toca el sobre 💌</div>

</div>

<!-- CARTA -->

<div class="card" id="carta">

    <img src="https://picsum.photos/300/150">

    <div class="message">
        Ponte más bonita de lo que ya eres, paso por ti a las 8. ❤️

    </div>

</div>

<audio id="music" loop>
    <source src="vivaldi.mp3" type="audio/mp3">
</audio>

<script>

    function abrirCarta(){

    document.getElementById("sobre").style.display="none"

    document.getElementById("carta").style.display="block"

    document.getElementById("music").play()

    crearCorazones()

    }

    function crearCorazones(){

    setInterval(()=>{

    const heart=document.createElement("div")

    heart.className="heart"

    heart.innerHTML="❤️"

    heart.style.left=Math.random()*100+"vw"

    heart.style.fontSize=(Math.random()*20+10)+"px"

    document.body.appendChild(heart)

    setTimeout(()=>{

    heart.remove()

    },4000)

    },300)

    }

</script>

</body>

</html>
